name: Cangyuan Production

on:
  push:
    branches: [main]
    paths:
      - '**/*.go'
      - 'web/**'
      - 'go.mod'
      - 'go.sum'
      - 'VERSION'
      - 'Dockerfile'
      - 'docker-entrypoint.sh'
      - '.github/workflows/cangyuan-prod.yml'
  workflow_dispatch:

concurrency:
  group: cangyuan-prod-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/cangyuansuanli/new-api
  STACK_PROFILE: newapi
  GHCR_PACKAGE: new-api

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify media routing contracts
        run: |
          set -euo pipefail
          go test ./model ./scripts/seed_model_ui_params ./relay/imagevendor ./relay/channel/openai ./relay/image ./service
          python3 -m json.tool scripts/seed_data/model_ui_params_image.json >/dev/null
          python3 -m py_compile scripts/seed_model_ui_params_image.py
          unformatted="$(gofmt -l \
            controller/relay.go controller/image_async.go \
            model/model_ui_params_resolve.go scripts/seed_model_ui_params/main.go \
            relay/image/sync.go relay/imagevendor/fixed_resolution.go \
            relay/imagevendor/fixed_resolution_test.go \
            relay/channel/openai/adapt_adobe2api.go \
            relay/channel/openai/adapt_adobe2api_test.go)"
          test -z "$unformatted" || { echo "gofmt required:"; echo "$unformatted"; exit 1; }

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:main
          cache-from: type=gha,scope=new-api-prod
          cache-to: type=gha,mode=max,scope=new-api-prod

      - name: Prune old GHCR versions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          owner="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          pkg="${{ env.GHCR_PACKAGE }}"
          keep=5
          versions="$(gh api "/users/${owner}/packages/container/${pkg}/versions?per_page=100" --jq '.[].id' 2>/dev/null || \
            gh api "/orgs/${owner}/packages/container/${pkg}/versions?per_page=100" --jq '.[].id' 2>/dev/null || true)"
          if [[ -z "$versions" ]]; then
            echo "No package versions to prune yet"
            exit 0
          fi
          count=0
          while IFS= read -r id; do
            [[ -n "$id" ]] || continue
            count=$((count + 1))
            if [[ $count -le $keep ]]; then
              continue
            fi
            gh api -X DELETE "/users/${owner}/packages/container/${pkg}/versions/${id}" 2>/dev/null || \
              gh api -X DELETE "/orgs/${owner}/packages/container/${pkg}/versions/${id}"
          done <<< "$versions"

      - name: Rolling deploy on origin
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.CANGYUAN_ORIGIN_HOST }}
          username: ${{ secrets.CANGYUAN_ORIGIN_USER }}
          key: ${{ secrets.CANGYUAN_ORIGIN_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /opt/cangyuan-stack
            ./stack.sh ci-deploy ${{ env.STACK_PROFILE }} --tag "${{ github.sha }}"

      - name: Rollback on deploy failure
        if: failure()
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.CANGYUAN_ORIGIN_HOST }}
          username: ${{ secrets.CANGYUAN_ORIGIN_USER }}
          key: ${{ secrets.CANGYUAN_ORIGIN_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /opt/cangyuan-stack
            ./stack.sh rollback ${{ env.STACK_PROFILE }} || true
